---

## 1. 약관의 동의

본 이용약관(「**약관**」)은 **InnoCode**(「**회사**」)이 제공하는 **Style Mirror** 모바일 애플리케이션 및 관련 서비스(「**서비스**」)의 이용 조건을 정합니다.

**문의:** innocode.core@gmail.com
**주소:** Republic of Korea

## 2. 이용 자격

서비스는 **본인의 이미지**(또는 명시적 동의를 받은 사람의 이미지)로 옷을 입어보는 용도로 제공됩니다.

이용자는 다음을 진술·보장합니다.

- **만 18세 이상**(또는 거주 국가의 성년 연령 이상)이며, 미성년자는 법정대리인의 동의가 있는 경우에만 이용합니다.
- **미성년자(만 18세 미만)** 의 사진을 업로드하거나, 미성년자를 대상으로 한 콘텐츠를 생성하지 않습니다.
- 보호자를 포함하여 **미성년자의 사진으로 피팅하는 행위**를 하지 않습니다.

위반 시 계정 제한·해지 및 법령에 따른 신고가 이루어질 수 있습니다.

## 3. 계정

- Google·이메일(인증코드) 등으로 로그인해야 AI 생성 기능을 이용할 수 있습니다(익명 이용 불가).
- 계정 보안 및 계정 하의 모든 활동에 대한 책임은 이용자에게 있습니다.
- 앱 설정에서 **회원 탈퇴**가 가능하며, 탈퇴 시 복구할 수 없습니다.
- 웰컴 체험 등 무료 혜택은 **계정당 1회**이며, 중복 가입·남용 시 제한될 수 있습니다.

## 4. 콘텐츠 정책 (Acceptable Use)

Style Mirror는 **의류 가상 피팅** 서비스입니다. 업로드 및 AI 생성(피팅·배경·영상)에 아래가 적용됩니다.

### 4.1 본인 사진·동의

- **본인 사진** 또는 **명시적 동의**를 받은 사람의 사진만 사용할 수 있습니다.
- 동의 없는 타인의 사진 업로드·사용은 **금지**됩니다.

### 4.2 성적·음란·과도한 노출

- **성적·음란·노출·선정적** 콘텐츠 또는 **특정 인물의 성적 대상화**를 금지합니다.
- 허용 여부는 **의상 종류가 아니라 결과의 노출·선정성**으로 판단되며, 과도한 결과는 **자동 차단**될 수 있습니다.

### 4.3 미성년자 — 절대 금지

- 미성년자 사진 업로드 및 미성년자 대상 생성(**특히 수영복·속옷**)을 **절대 금지**합니다.
- **형사처벌** 대상이 될 수 있으며, 법령에 따라 **관계기관에 신고**될 수 있습니다.

### 4.4 제3자 AI 안전정책

- 생성 기능은 **제3자 AI**(현재 피팅·배경 Google Gemini, 영상 Luma — 최신 목록은 [개인정보처리방침](privacy.html) 참조)로 제공되며, 각 제공사의 안전정책이 적용됩니다.

### 4.5 위반 시 조치

- **자동 모더레이션·로그·이용 제한**을 적용합니다.
- **반복 위반** 시 생성 기능 일시 제한, 위반 요청에 사용된 크레딧 **환불 불가**, 계정 정지·해지가 될 수 있습니다.
- 네트워크 오류 등 **시스템·품질 실패**는 §6에 따라 크레딧이 환원될 수 있습니다.

### 4.6 신고

본인 사진의 무단 사용, 정책 위반(**특히 미성년자 관련**) 발견 시 **설정 › 지원 › 문의하기** 또는 innocode.core@gmail.com 로 신고해 주세요.

## 5. AI 서비스 및 면책

- 결과물은 **AI가 생성**하며 부정확·비현실적일 수 있습니다. **개인 스타일 참고용**이며 전문적 조언이 아닙니다.
- 제3자 AI의 가용성·품질을 보장하지 않습니다.
- 결과물의 **공유·게시** 및 관련 법령·플랫폼 규정 준수 책임은 이용자에게 있습니다.

## 6. 크레딧·구독·결제

### 6.1 크레딧

- **피팅 크레딧**과 **영상 크레딧**은 별도 잔액입니다.
- 생성 1회마다 앱에 표시된 만큼 차감됩니다.
- **사용된 크레딧은 환불되지 않습니다.** 시스템 오류 등으로 생성에 실패한 경우 잔액으로 자동 환원될 수 있습니다.
- 웰컴 체험·친구 초대·쿠폰 등 **프로모션 크레딧**은 현금 가치가 없습니다.

### 6.2 유효기간·이월 없음

- 크레딧 종류별 **유효기간은 구매(지급) 시점에 앱에 표시**됩니다. 만료된 크레딧은 소멸합니다.
- **구독 월 제공분은 해당 결제 주기 말일에 만료되며, 미사용분은 이월되지 않습니다.**
- 웰컴 체험은 **계정당 1회**입니다.

### 6.3 인앱결제

- **Apple App Store·Google Play** 인앱결제로만 유료 상품을 구매합니다. 가격·통화·결제 주기·**자동갱신 조건은 구매 전 스토어와 앱에 표시**됩니다.
- 구독은 스토어 설정에서 해지할 때까지 **자동 갱신**됩니다.
- 지원되는 경우 앱에서 **구매 복원**이 가능합니다.

### 6.4 환불

- 결제 환불은 **Apple/Google 정책**을 따릅니다.
- 스토어 환불 시 해당 구매의 **미사용 크레딧**이 회수될 수 있습니다.
- **환불 남용**(구매→사용→환불 반복) 시 프로모션 크레딧 제한·계정 제한이 될 수 있습니다.

### 6.5 전자상거래 관련 (한국 이용자)

- **디지털 콘텐츠·크레딧:** 생성 요청 후 크레딧이 차감·서비스가 제공된 경우, 법령이 허용하는 범위에서 **청약 철회가 제한**될 수 있습니다.

  <script>
    var TITLES = { ko: '이용약관 — Style Mirror', en: 'Terms of Service — Style Mirror', ja: '利用規約 — Style Mirror' };

    }
    (function () {
      var btns = document.querySelectorAll('.langbar button');
      for (var i = 0; i < btns.length; i++) {
